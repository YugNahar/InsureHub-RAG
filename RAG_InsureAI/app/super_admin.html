<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InsureHub — Super Admin</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2d3148;
    --accent:#6c63ff;--accent2:#8b83ff;--text:#e4e6f0;--muted:#7b809a;
    --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--sidebar-w:272px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

  /* Login */
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:360px;display:flex;flex-direction:column;gap:18px}
  .login-card h1{font-size:1.4rem;font-weight:700;text-align:center}
  .login-card p{color:var(--muted);font-size:.85rem;text-align:center}
  .login-card input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:11px 14px;font-size:.95rem;outline:none;width:100%}
  .login-card input:focus{border-color:var(--accent)}
  .login-card button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:600;cursor:pointer}
  .login-card button:hover{background:var(--accent2)}
  #login-error{color:var(--red);font-size:.83rem;text-align:center;display:none}

  /* Layout */
  #app{display:flex;flex:1;height:100vh;overflow:hidden}

  /* Sidebar */
  #sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  #sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
  .brand{font-size:.73rem;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
  #sidebar-header h2{font-size:1.05rem;font-weight:700}
  #sidebar-tabs{display:flex;padding:10px 10px 0;gap:6px}
  .s-tab{flex:1;background:transparent;border:none;color:var(--muted);padding:7px 4px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer}
  .s-tab.active{background:var(--surface2);color:var(--text)}
  #agent-list,#sessions-list{flex:1;overflow-y:auto;padding:8px}

  .agent-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
  .agent-item:hover{background:var(--surface2)}
  .agent-item.selected{background:var(--surface2);border-color:var(--border)}
  .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot-online{background:var(--green)}
  .dot-offline{background:var(--red)}
  .dot-chatting{background:#fff;animation:blink-dot 1s ease-in-out infinite}
  @keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.15}}
  .agent-name-row{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
  .agent-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
  .badge-blocked{font-size:.62rem;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px}

  .ls-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
  .ls-item:hover,.ls-item.selected{border-color:var(--accent)}
  .ls-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .ls-meta{font-size:.71rem;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .status-pill{padding:1px 6px;border-radius:4px;font-size:.67rem;font-weight:700;text-transform:uppercase}
  .pill-human{background:#16a34a22;color:var(--green)}
  .pill-waiting{background:#d9770622;color:var(--yellow)}
  .pill-ai{background:#6c63ff22;color:var(--accent2)}

  /* Main */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #main-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  #main-title{font-size:1.1rem;font-weight:700}
  #conn-badge{font-size:.73rem;display:flex;align-items:center;gap:6px;color:var(--muted)}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
  .conn-dot.live{background:var(--green)}
  #main-content{flex:1;overflow-y:auto;padding:24px}

  #welcome-view{text-align:center;margin-top:80px;color:var(--muted)}
  #welcome-view h2{font-size:1.5rem;color:var(--text);margin-bottom:8px}

  /* Agent detail */
  #agent-detail{display:none}
  .detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
  .detail-title{display:flex;align-items:center;gap:10px;font-size:1.15rem;font-weight:700}
  .btn{border:none;border-radius:8px;padding:8px 18px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
  .btn-block{background:#ef444422;color:var(--red);border:1px solid var(--red)}
  .btn-block:hover{background:var(--red);color:#fff}
  .btn-unblock{background:#22c55e22;color:var(--green);border:1px solid var(--green)}
  .btn-unblock:hover{background:var(--green);color:#fff}
  .btn-assign{background:var(--accent);color:#fff}
  .btn-assign:hover{background:var(--accent2)}
  .btn-delete{background:#ef444422;color:var(--red);border:1px solid var(--red)}
  .btn-delete:hover{background:var(--red);color:#fff}

  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
  .tab{background:transparent;border:none;color:var(--muted);padding:10px 18px;font-size:.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .stat-val{font-size:1.6rem;font-weight:700}

  .section-label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;background:var(--surface2)}
  tr:last-child td{border-bottom:none}

  /* Chat cards */
  .chat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .chat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
  .chat-head:hover{background:var(--surface2)}
  .chat-sid{font-size:.83rem;font-weight:600}
  .chat-info{font-size:.72rem;color:var(--muted);margin-top:3px}
  .chat-arrow{color:var(--muted);font-size:.8rem}
  .transcript{display:none;padding:4px 16px 14px;border-top:1px solid var(--border)}
  .transcript.open{display:block}

  /* Messages */
  .msg{margin-bottom:10px}
  .msg-header{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .role-user .msg-header{color:var(--accent2)}
  .role-agent .msg-header{color:var(--green)}
  .role-ai .msg-header{color:#818cf8}
  .role-system .msg-header{color:var(--muted)}
  .msg-bubble{font-size:.82rem;line-height:1.55;background:var(--surface2);border-radius:7px;padding:8px 12px}

  /* View-mode toggle */
  .view-toggle{display:flex;gap:6px;margin:8px 0 12px}
  .vtbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;font-size:.75rem;font-weight:600;cursor:pointer;transition:.15s}
  .vtbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Session detail view */
  #session-detail{display:none}
  .session-conv-header{margin-bottom:18px}
  .session-conv-title{font-size:1.05rem;font-weight:700;margin-bottom:6px}
  .session-conv-meta{font-size:.78rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}

  /* Assign rows */
  .assign-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .assign-info{flex:1;min-width:0}
  .assign-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .assign-meta{font-size:.72rem;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center}
  .assign-card select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:.8rem;min-width:130px}
  .assign-card .btn-assign{padding:7px 14px;font-size:.8rem;white-space:nowrap}

  .empty{color:var(--muted);font-size:.83rem;padding:20px;text-align:center}
  .online-since{color:var(--green);font-size:.82rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Super Admin</h1>
    <p>InsureHub — Agent Management Console</p>
    <input type="password" id="pw-input" placeholder="Super admin password" />
    <div id="login-error">Incorrect password. Try again.</div>
    <button id="login-btn">Sign in</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="brand">InsureHub</div>
      <h2>Super Admin</h2>
    </div>
    <div id="sidebar-tabs">
      <button class="s-tab active" id="s-tab-agents">Agents</button>
      <button class="s-tab" id="s-tab-sessions">All Sessions</button>
    </div>
    <div id="agent-list"></div>
    <div id="sessions-list" style="display:none"></div>
  </div>

  <div id="main">
    <div id="main-header">
      <div id="main-title">Overview</div>
      <div id="conn-badge"><div class="conn-dot" id="conn-dot"></div><span id="conn-label">Connecting…</span></div>
    </div>
    <div id="main-content">
      <div id="welcome-view">
        <h2>Welcome, Super Admin</h2>
        <p>Select an agent from the sidebar to view activity, or browse <strong>All Sessions</strong> to see every conversation.</p>
      </div>
      <div id="agent-detail"></div>
      <div id="session-detail"></div>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let token = sessionStorage.getItem('sa_token') || '';
let ws = null;
let allData = { agents: [], live_sessions: [] };
let selectedAgentName = null;
let selectedSessionId = null;
let sidebarMode = 'agents';
let detailTab = 'overview';
let _sidebarAgents = [];
let _allSessions = [];
let _sessionViewModes = {};  // session_id → 'full' | 'agent'
let _chatViewModes = {};     // card-idx → 'full' | 'agent'
let pingTimer = null;

// ── Login ──────────────────────────────────────────────────────────────────
if (token) boot();

document.getElementById('login-btn').onclick = doLogin;
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch('/super-admin/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw }),
    });
    if (!r.ok) { err.style.display = 'block'; return; }
    token = (await r.json()).token;
    sessionStorage.setItem('sa_token', token);
    boot();
  } catch { err.style.display = 'block'; }
}

function boot() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  setupSidebarTabs();
  connectWS();
}

// ── Sidebar tabs ───────────────────────────────────────────────────────────
function setupSidebarTabs() {
  document.getElementById('s-tab-agents').onclick   = () => switchSidebarMode('agents');
  document.getElementById('s-tab-sessions').onclick = () => switchSidebarMode('sessions');
}

function switchSidebarMode(mode) {
  sidebarMode = mode;
  document.getElementById('agent-list').style.display    = mode === 'agents'   ? '' : 'none';
  document.getElementById('sessions-list').style.display = mode === 'sessions' ? '' : 'none';
  document.getElementById('s-tab-agents').classList.toggle('active',   mode === 'agents');
  document.getElementById('s-tab-sessions').classList.toggle('active', mode === 'sessions');
  if (mode === 'sessions') renderSidebarSessions();
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/super-admin`);
  ws.onopen = () => ws.send(JSON.stringify({ token }));
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'error') { sessionStorage.removeItem('sa_token'); location.reload(); return; }
      if (msg.type === 'connected' || msg.type === 'update') {
        const firstLoad = !allData.agents.length;
        allData = { agents: msg.agents || [], live_sessions: msg.live_sessions || [] };
        renderAll();
        setConn(true);
        if (firstLoad && allData.agents.length && !selectedAgentName) selectAgent(0);
      }
    } catch(ex) { console.error(ex); }
  };
  ws.onclose = () => { setConn(false); setTimeout(connectWS, 4000); };
  ws.onerror  = () => ws.close();
  if (pingTimer) clearInterval(pingTimer);
  pingTimer = setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'ping'})); }, 25000);
}

function setConn(live) {
  document.getElementById('conn-dot').className = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('conn-label').textContent = live ? 'Live' : 'Reconnecting…';
}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  renderSidebarAgents();
  if (sidebarMode === 'sessions') renderSidebarSessions();
  if (selectedAgentName) {
    const fresh = allData.agents.find(a => a.name === selectedAgentName);
    if (fresh) renderMainPanel(fresh);
  }
}

// ── Sidebar — agents ───────────────────────────────────────────────────────
function renderSidebarAgents() {
  const el = document.getElementById('agent-list');
  if (!allData.agents.length) { el.innerHTML = '<div class="empty">No agents yet.</div>'; return; }

  _sidebarAgents = [...allData.agents].sort((a, b) => {
    const r = {chatting:0, online:1, offline:2};
    return (r[a.status]||2) - (r[b.status]||2) || a.name.localeCompare(b.name);
  });

  el.innerHTML = _sidebarAgents.map((a, i) => `
    <div class="agent-item${a.name === selectedAgentName ? ' selected' : ''}" data-idx="${i}">
      <div class="status-dot ${dotClass(a.status)}"></div>
      <div style="flex:1;min-width:0">
        <div class="agent-name-row">
          ${h(a.name)}${a.blocked ? '<span class="badge-blocked">BLOCKED</span>' : ''}
        </div>
        <div class="agent-sub">${statusText(a.status)} · ${a.today_queries} replies today</div>
      </div>
    </div>`).join('');

  el.onclick = e => {
    const item = e.target.closest('.agent-item');
    if (!item) return;
    selectAgent(parseInt(item.dataset.idx, 10));
  };
}

function selectAgent(idx) {
  const a = _sidebarAgents[idx];
  if (!a) return;
  selectedAgentName = a.name;
  selectedSessionId = null;
  detailTab = 'overview';
  renderSidebarAgents();
  renderMainPanel(a);
}

// ── Sidebar — all sessions ─────────────────────────────────────────────────
async function renderSidebarSessions() {
  const el = document.getElementById('sessions-list');
  el.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await fetch('/super-admin/sessions', { headers: {'X-Super-Admin-Token': token} });
    if (!r.ok) throw new Error(r.status);
    const { sessions } = await r.json();
    _allSessions = sessions || [];
    if (!_allSessions.length) { el.innerHTML = '<div class="empty">No sessions yet.</div>'; return; }
    el.innerHTML = _allSessions.map((s, i) => `
      <div class="ls-item${s.session_id === selectedSessionId ? ' selected' : ''}" data-sid="${h(s.session_id)}" data-idx="${i}">
        <div class="ls-title">${h(s.title)}</div>
        <div class="ls-meta">
          <span class="status-pill pill-${s.status}">${s.status}</span>
          <span>${s.message_count} msgs</span>
          ${s.has_agent ? '<span style="color:var(--green);font-size:.67rem">👤 agent</span>' : ''}
        </div>
      </div>`).join('');
    el.onclick = e => {
      const item = e.target.closest('[data-sid]');
      if (!item) return;
      showSessionDetail(item.dataset.sid, _allSessions[parseInt(item.dataset.idx, 10)]);
    };
  } catch(ex) {
    el.innerHTML = `<div class="empty">Failed to load (${ex.message}).</div>`;
  }
}

// ── Session detail view ────────────────────────────────────────────────────
async function showSessionDetail(sid, meta) {
  selectedSessionId = sid;
  selectedAgentName = null;

  document.getElementById('welcome-view').style.display = 'none';
  document.getElementById('agent-detail').style.display = 'none';
  document.getElementById('session-detail').style.display = 'block';
  document.getElementById('main-title').textContent = 'Session';

  // Highlight in sidebar
  document.querySelectorAll('#sessions-list .ls-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.sid === sid);
  });

  const viewMode = _sessionViewModes[sid] || 'full';
  const detailEl = document.getElementById('session-detail');
  detailEl.innerHTML = `
    <div class="session-conv-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px">
        <div class="session-conv-title" style="margin-bottom:0">${h(meta?.title || sid)}</div>
        <button class="btn btn-delete" id="sv-delete" style="white-space:nowrap;flex-shrink:0">Delete Chat</button>
      </div>
      <div class="session-conv-meta">
        <span class="status-pill pill-${meta?.status}">${meta?.status || '—'}</span>
        <span>${meta?.message_count || 0} total messages</span>
        ${meta?.has_agent ? '<span style="color:var(--green)">👤 agent involved</span>' : ''}
        <span>${h(meta?.created_at || '')}</span>
      </div>
      <div class="view-toggle">
        <button class="vtbtn${viewMode==='full'?' active':''}" id="sv-full">Full Conversation</button>
        <button class="vtbtn${viewMode==='agent'?' active':''}" id="sv-agent">Agent Only</button>
      </div>
    </div>
    <div id="session-msgs"><div class="empty">Loading…</div></div>`;

  detailEl.querySelector('#sv-full').onclick = () => {
    _sessionViewModes[sid] = 'full';
    detailEl.querySelector('#sv-full').classList.add('active');
    detailEl.querySelector('#sv-agent').classList.remove('active');
    renderSessionMsgs(sid, 'full');
  };
  detailEl.querySelector('#sv-agent').onclick = () => {
    _sessionViewModes[sid] = 'agent';
    detailEl.querySelector('#sv-full').classList.remove('active');
    detailEl.querySelector('#sv-agent').classList.add('active');
    renderSessionMsgs(sid, 'agent');
  };
  detailEl.querySelector('#sv-delete').onclick = () => doDeleteSession(sid, () => {
    document.getElementById('session-detail').style.display = 'none';
    document.getElementById('welcome-view').style.display = '';
    document.getElementById('main-title').textContent = 'Overview';
    selectedSessionId = null;
    renderSidebarSessions();
  });

  await renderSessionMsgs(sid, viewMode);
}

async function renderSessionMsgs(sid, viewMode) {
  const msgsEl = document.getElementById('session-msgs');
  if (!msgsEl) return;
  msgsEl.innerHTML = '<div class="empty">Loading messages…</div>';
  try {
    const r = await fetch(`/super-admin/session/${encodeURIComponent(sid)}/messages`,
      { headers: {'X-Super-Admin-Token': token} });
    if (!r.ok) throw new Error(r.status);
    const { messages } = await r.json();
    const filtered = viewMode === 'agent' ? filterAgentOnly(messages) : messages;
    if (!filtered.length) {
      msgsEl.innerHTML = '<div class="empty">No messages ' + (viewMode === 'agent' ? '(no escalations or agent messages in this session)' : 'in this session') + '.</div>';
      return;
    }
    msgsEl.innerHTML = viewMode === 'agent'
      ? filtered.map(renderAgentOnlyMsg).join('')
      : filtered.map(m => `
          <div class="msg role-${m.role}">
            <div class="msg-header">${roleName(m.role)}&nbsp;&nbsp;${h(fmtTime(m.timestamp)||'')}</div>
            <div class="msg-bubble">${h(m.content)}</div>
          </div>`).join('');
  } catch(ex) {
    msgsEl.innerHTML = `<div class="empty">Failed to load messages (${ex.message}).</div>`;
  }
}

// ── Main panel — agent detail ──────────────────────────────────────────────
function renderMainPanel(agent) {
  document.getElementById('welcome-view').style.display = 'none';
  document.getElementById('session-detail').style.display = 'none';
  document.getElementById('main-title').textContent = agent.name;
  const el = document.getElementById('agent-detail');
  el.style.display = 'block';

  const blockBtn = agent.blocked
    ? `<button class="btn btn-unblock" id="action-btn">Unblock Agent</button>`
    : `<button class="btn btn-block"   id="action-btn">Block Agent</button>`;

  el.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">
        <div class="status-dot ${dotClass(agent.status)}"></div>
        <span>${h(agent.name)}</span>
        <span style="font-size:.85rem;color:var(--muted);font-weight:400">${statusText(agent.status)}</span>
        ${agent.blocked ? '<span class="badge-blocked">BLOCKED</span>' : ''}
      </div>
      <div>${blockBtn}</div>
    </div>
    <div class="tabs">
      <button class="tab${detailTab==='overview'?' active':''}" data-tab="overview">Overview</button>
      <button class="tab${detailTab==='chats'  ?' active':''}" data-tab="chats">Chat History</button>
      <button class="tab${detailTab==='assign' ?' active':''}" data-tab="assign">Assign Session</button>
    </div>
    <div id="detail-body"></div>`;

  el.querySelector('.tabs').onclick = e => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    detailTab = btn.dataset.tab;
    el.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === detailTab));
    renderDetailBody(agent);
  };

  const actionBtn = el.querySelector('#action-btn');
  if (actionBtn) actionBtn.onclick = () => toggleBlock(agent.name, !agent.blocked);

  renderDetailBody(agent);
}

// ── Detail body ────────────────────────────────────────────────────────────
async function renderDetailBody(agent) {
  const body = document.getElementById('detail-body');
  if (!body) return;

  if (detailTab === 'overview') {
    const sessions = agent.login_sessions || [];
    const totalHours = (sessions.reduce((s, x) => s + (x.duration_minutes || 0), 0) / 60).toFixed(1);
    const rows = sessions.length
      ? [...sessions].reverse().slice(0, 50).map(s => {
          const ongoing = !s.logout_time;
          return `<tr>
            <td>${h(s.login_time || '—')}</td>
            <td>${ongoing ? '<span style="color:var(--green)">Still online</span>' : h(s.logout_time)}</td>
            <td>${s.duration_minutes != null ? s.duration_minutes + ' min' : (ongoing ? '<span style="color:var(--green)">Active now</span>' : '—')}</td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="3" class="empty">No history recorded yet.</td></tr>`;

    body.innerHTML = `
      ${agent.current_login_time ? `<div class="online-since">● Online since ${h(agent.current_login_time)} UTC</div>` : ''}
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Replies</div><div class="stat-val">${agent.total_queries_answered}</div></div>
        <div class="stat-card"><div class="stat-label">Today Replies</div><div class="stat-val">${agent.today_queries}</div></div>
        <div class="stat-card"><div class="stat-label">Today Online</div><div class="stat-val">${agent.today_hours}h</div></div>
        <div class="stat-card"><div class="stat-label">Login Sessions</div><div class="stat-val">${sessions.length}</div></div>
      </div>
      <div class="section-label">Login / Logout History</div>
      <div class="table-wrap">
        <table><thead><tr><th>Login (UTC)</th><th>Logout (UTC)</th><th>Duration</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>`;

  } else if (detailTab === 'chats') {
    body.innerHTML = '<div class="empty">Loading chat history…</div>';
    try {
      const r = await fetch(`/super-admin/agent/${encodeURIComponent(agent.name)}/chats`,
        { headers: {'X-Super-Admin-Token': token} });
      if (!r.ok) throw new Error(r.status);
      const { chats } = await r.json();

      if (!chats || !chats.length) {
        body.innerHTML = '<div class="empty">No chats recorded yet.</div>';
        return;
      }

      // Deduplicate by session_id — merge multiple takeover episodes into one card
      const sidMap = new Map();
      for (const c of chats) {
        const sid = c.session_id;
        if (!sidMap.has(sid)) {
          sidMap.set(sid, { ...c });
        } else {
          const ex = sidMap.get(sid);
          ex.reply_count = (ex.reply_count || 0) + (c.reply_count || 0);
          // Keep the latest ended_at
          if (c.ended_at) ex.ended_at = c.ended_at;
          // If any episode is still open, mark as open
          if (!c.ended_at) ex.ended_at = null;
        }
      }
      const deduped = [...sidMap.values()].reverse(); // newest first

      body.innerHTML = deduped.map((c, i) => `
        <div class="chat-card" data-sid="${h(c.session_id)}" data-idx="${i}">
          <div class="chat-head">
            <div>
              <div class="chat-sid">Session #${h(c.session_id)} &nbsp;·&nbsp; ${c.reply_count||0} agent replies</div>
              <div class="chat-info">${h(c.started_at||'')} ${c.ended_at ? '→ '+h(c.ended_at) : '→ <span style="color:var(--green)">Ongoing</span>'}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <button class="btn btn-delete chat-del" data-del-idx="${i}" style="padding:5px 12px;font-size:.75rem">Delete</button>
              <span class="chat-arrow" data-arr="${i}">▼</span>
            </div>
          </div>
          <div class="transcript" id="ct-${i}">
            <div class="view-toggle" style="margin-top:8px">
              <button class="vtbtn active" data-view="full" data-for="${i}">Full Conversation</button>
              <button class="vtbtn" data-view="agent" data-for="${i}">Agent Only</button>
            </div>
            <div id="ct-msgs-${i}"><div class="empty" style="padding:8px 0">Expand to load messages.</div></div>
          </div>
        </div>`).join('');

      body.onclick = async e => {
        // Delete button clicked?
        const delBtn = e.target.closest('.chat-del');
        if (delBtn) {
          e.stopPropagation();
          const idx = delBtn.dataset.delIdx;
          const card = body.querySelector(`[data-idx="${idx}"]`);
          const sid = card?.dataset.sid;
          if (!sid) return;
          doDeleteSession(sid, () => card.remove());
          return;
        }
        // View toggle button clicked?
        const vtBtn = e.target.closest('[data-view][data-for]');
        if (vtBtn) {
          const idx = vtBtn.dataset.for;
          const sid = body.querySelector(`[data-idx="${idx}"]`)?.dataset.sid;
          const viewMode = vtBtn.dataset.view;
          if (!sid) return;
          _chatViewModes[idx] = viewMode;
          // Update button active state
          body.querySelectorAll(`[data-for="${idx}"]`).forEach(b => {
            b.classList.toggle('active', b.dataset.view === viewMode);
          });
          const tr = document.getElementById(`ct-${idx}`);
          if (tr && tr.classList.contains('open')) {
            await loadChatMsgs(idx, sid, viewMode);
          }
          return;
        }
        // Card head clicked → expand/collapse
        const head = e.target.closest('.chat-head');
        if (!head) return;
        const card = head.closest('.chat-card');
        if (!card) return;
        const idx = card.dataset.idx;
        const sid = card.dataset.sid;
        const tr = document.getElementById(`ct-${idx}`);
        const arr = card.querySelector(`[data-arr="${idx}"]`);
        if (!tr) return;
        tr.classList.toggle('open');
        if (arr) arr.textContent = tr.classList.contains('open') ? '▲' : '▼';
        if (tr.classList.contains('open')) {
          await loadChatMsgs(idx, sid, _chatViewModes[idx] || 'full');
        }
      };

    } catch(ex) {
      body.innerHTML = `<div class="empty">Failed to load chat history (${ex.message}).</div>`;
    }

  } else if (detailTab === 'assign') {
    const onlineFree = allData.agents.filter(a => a.status !== 'offline' && !a.blocked);
    const sessions = allData.live_sessions;
    if (!sessions.length) { body.innerHTML = '<div class="empty">No active sessions to assign.</div>'; return; }

    body.innerHTML = `
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">
        Assign any active session directly to an online agent.
      </p>
      ${sessions.map((s, si) => `
        <div class="assign-card">
          <div class="assign-info">
            <div class="assign-title">${h(s.title || s.session_id)}</div>
            <div class="assign-meta">
              <span class="status-pill pill-${s.status}">${s.status}</span>
              <span>${s.message_count} msgs</span>
            </div>
          </div>
          ${onlineFree.length
            ? `<select data-sid="${h(s.session_id)}" class="assign-sel">
                <option value="">— pick agent —</option>
                ${onlineFree.map(a => `<option value="${h(a.name)}"${a.name===agent.name?' selected':''}>${h(a.name)}</option>`).join('')}
              </select>
              <button class="btn btn-assign assign-go" data-si="${si}">Assign</button>`
            : `<span style="font-size:.8rem;color:var(--muted)">No agents online</span>`}
        </div>`).join('')}`;

    body.querySelectorAll('.assign-go').forEach(btn => {
      btn.onclick = async () => {
        const card = btn.closest('.assign-card');
        const sel  = card.querySelector('.assign-sel');
        if (!sel || !sel.value) return;
        await doAssign(sel.dataset.sid, sel.value);
      };
    });
  }
}

// ── Agent-only smart filter ────────────────────────────────────────────────
// Layla's canned "I can't answer" phrases — same set as response_needs_human in backend
const _LAYLA_REFUSAL = [
  "don't have information", "don't have that", "not in my knowledge",
  "not in the documents", "can't find", "couldn't find", "no information",
  "not sure about", "can't answer", "cannot answer", "don't know",
  "outside my knowledge", "not covered in", "not available in",
  "not from your uploaded documents", "not in the uploaded documents",
  // canned refusal lines from multi_source_rag
  "don't have that specific information in my knowledge base",
  "that topic doesn't seem to be covered in my knowledge base",
  "don't have that in my knowledge base",
];

function _isLaylaRefusal(content) {
  const lower = (content || '').toLowerCase();
  return _LAYLA_REFUSAL.some(p => lower.includes(p));
}

// Returns only: escalation-triggered / unanswered user messages (tagged "NOT ANSWERED") +
// user messages the human agent actually answered + all agent replies.
function filterAgentOnly(messages) {
  const out = [];
  for (let i = 0; i < messages.length; i++) {
    const m = messages[i];
    // Always show agent replies
    if (m.role === 'agent') { out.push(m); continue; }
    if (m.role !== 'user') continue;

    // Backend-tagged: email was sent because Layla couldn't answer. If an agent
    // later resolved it from the "Unanswered Queries" panel, escalation_resolved
    // is set and a linked agent reply (meta.answers_index === i) exists — show it
    // as answered instead of leaving the stale "not answered" flag from when it
    // was first escalated.
    if (m.meta && m.meta.escalation_sent) {
      if (m.meta.escalation_resolved) {
        const reply = messages.find(x => x.role === 'agent' && x.meta && x.meta.answers_index === i);
        out.push({
          ...m,
          _answered: true,
          _resolved_by: m.meta.resolved_by || '',
          _answer_text: reply ? reply.content : '',
          _answer_time: reply ? reply.timestamp : '',
        });
      } else {
        out.push({...m, _not_answered: true, _reason: 'email_sent'});
      }
      continue;
    }

    // Frontend detection: next AI response is a refusal AND no agent stepped in
    // before the next user message
    const nextMsg = messages[i + 1];
    if (nextMsg && nextMsg.role === 'ai' && _isLaylaRefusal(nextMsg.content)) {
      let agentAnswered = false;
      for (let j = i + 1; j < messages.length; j++) {
        if (messages[j].role === 'agent') { agentAnswered = true; break; }
        if (messages[j].role === 'user') break; // new question before any agent = not answered
      }
      // BUG (fixed): when agentAnswered was true, this used to fall through to
      // the agent-phase check below without pushing `m` — and that check broke
      // on the very next 'ai' message (the refusal itself) before ever reaching
      // the 'agent' reply that comes after it, so the question silently
      // vanished from the agent-only view while the agent's reply still showed
      // unconditionally. Push the question directly here instead — we've
      // already confirmed an agent answered it.
      if (agentAnswered) { out.push(m); continue; }
      out.push({...m, _not_answered: true, _reason: 'layla_refused'});
      continue;
    }

    // Agent-phase: an agent reply anywhere before the next user message means
    // this question was answered by an agent — even if Layla's own (non-refusal)
    // answer comes first and the agent adds/corrects afterward. Don't stop at
    // the first 'ai' role; keep scanning past it for a later 'agent' message.
    let agentPhase = false;
    for (let j = i + 1; j < messages.length; j++) {
      if (messages[j].role === 'agent') { agentPhase = true; break; }
      if (messages[j].role === 'user') break;
    }
    if (agentPhase) out.push(m);
  }
  return out;
}

function renderAgentOnlyMsg(m) {
  let badge = '';
  let answerBlock = '';
  if (m._not_answered) {
    const label = m._reason === 'email_sent'
      ? '🔴 NOT ANSWERED — email sent, no agent responded'
      : '🔴 NOT ANSWERED — outside knowledge base, no agent was available';
    badge = `<span style="background:#ef444420;color:#ef4444;font-size:.65rem;font-weight:700;border-radius:4px;padding:1px 6px;margin-left:8px;border:1px solid #ef444440">${label}</span>`;
  } else if (m._answered) {
    const label = '🟢 ANSWERED' + (m._resolved_by ? ` by ${h(m._resolved_by)}` : '');
    badge = `<span style="background:#22c55e20;color:#22c55e;font-size:.65rem;font-weight:700;border-radius:4px;padding:1px 6px;margin-left:8px;border:1px solid #22c55e40">${label}</span>`;
    if (m._answer_text) {
      answerBlock = `<div class="msg-bubble" style="margin-top:6px;border-left:3px solid #22c55e;background:#22c55e10">
        <div style="font-size:.65rem;font-weight:700;color:#22c55e;margin-bottom:2px">ANSWER${m._answer_time ? ' · ' + h(fmtTime(m._answer_time)) : ''}</div>
        ${h(m._answer_text)}
      </div>`;
    }
  }
  return `
    <div class="msg role-${m.role}">
      <div class="msg-header">${roleName(m.role)}&nbsp;&nbsp;${h(fmtTime(m.timestamp)||'')}${badge}</div>
      <div class="msg-bubble">${h(m.content)}</div>
      ${answerBlock}
    </div>`;
}

// ── Load messages for a chat card ─────────────────────────────────────────
async function loadChatMsgs(idx, sid, viewMode) {
  const msgsEl = document.getElementById(`ct-msgs-${idx}`);
  if (!msgsEl) return;
  msgsEl.innerHTML = '<div class="empty" style="padding:8px 0">Loading…</div>';
  try {
    const r = await fetch(`/super-admin/session/${encodeURIComponent(sid)}/messages`,
      { headers: {'X-Super-Admin-Token': token} });
    if (!r.ok) throw new Error(r.status);
    const { messages } = await r.json();
    const filtered = viewMode === 'agent' ? filterAgentOnly(messages) : messages;
    if (!filtered.length) {
      msgsEl.innerHTML = '<div class="empty" style="padding:8px 0">' +
        (viewMode === 'agent' ? 'No escalations or agent messages in this session.' : 'No messages.') + '</div>';
      return;
    }
    msgsEl.innerHTML = viewMode === 'agent'
      ? filtered.map(renderAgentOnlyMsg).join('')
      : filtered.map(m => `
          <div class="msg role-${m.role}">
            <div class="msg-header">${roleName(m.role)}&nbsp;&nbsp;${h(fmtTime(m.timestamp)||'')}</div>
            <div class="msg-bubble">${h(m.content)}</div>
          </div>`).join('');
  } catch(ex) {
    msgsEl.innerHTML = `<div class="empty" style="padding:8px 0">Failed to load (${ex.message}).</div>`;
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
async function doDeleteSession(sid, onSuccess) {
  if (!confirm(`Delete chat for session #${sid}?\n\nThis permanently removes the conversation history and cannot be undone.`)) return;
  try {
    const r = await fetch(`/super-admin/session/${encodeURIComponent(sid)}`, {
      method: 'DELETE',
      headers: {'X-Super-Admin-Token': token},
    });
    const d = await r.json();
    if (d.ok) {
      toast('Chat deleted');
    } else {
      // Already gone server-side — the end state the user wants (card gone)
      // is the same either way, so don't leave a stale card sitting there
      // with a Delete button that will just fail again next time.
      toast('Already removed from server', false);
    }
    onSuccess();
  } catch(ex) {
    toast('Delete failed — ' + ex.message, true);
  }
}

async function toggleBlock(name, block) {
  const url = `/super-admin/agent/${encodeURIComponent(name)}/${block ? 'block' : 'unblock'}`;
  await fetch(url, { method: 'POST', headers: {'X-Super-Admin-Token': token} });
  toast(`${name} ${block ? 'blocked' : 'unblocked'}`);
}

async function doAssign(sessionId, agentName) {
  const r = await fetch('/super-admin/assign', {
    method: 'POST',
    headers: {'Content-Type':'application/json','X-Super-Admin-Token':token},
    body: JSON.stringify({ session_id: sessionId, agent_name: agentName }),
  });
  const d = await r.json();
  toast(d.ok ? `Session assigned to ${agentName}` : 'Failed — agent may be offline or blocked.', !d.ok);
}

// ── Helpers ────────────────────────────────────────────────────────────────
// Message timestamps are ISO 8601 with a UTC offset (e.g. "2026-07-07T14:23:45+00:00"),
// so they can be converted to the viewer's local time zone. Older persisted
// messages only have a bare "HH:MM" (no date/offset — the pre-fix format),
// which can't be recovered or converted; those are shown as-is.
function fmtTime(ts) {
  if (!ts) return '';
  if (!ts.includes('T')) return ts; // legacy bare "HH:MM", nothing to convert
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}
function roleName(role) {
  if (role === 'user')   return 'USER';
  if (role === 'agent')  return 'AGENT';
  if (role === 'ai')     return 'LAYLA (AI)';
  if (role === 'system') return 'SYSTEM';
  return role.toUpperCase();
}
function dotClass(s) { return s==='chatting'?'dot-chatting':s==='online'?'dot-online':'dot-offline'; }
function statusText(s) { return s==='chatting'?'● Chatting':s==='online'?'● Online':'● Offline'; }
function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toast(msg, err=false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${err?'var(--red)':'var(--green)'};color:#fff;padding:10px 20px;border-radius:8px;font-size:.83rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity='1'; });
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}
</script>
